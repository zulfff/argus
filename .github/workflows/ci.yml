name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  check:
    name: check + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libssl-dev libpq-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --exclude argus-ebpf -- -D warnings

      - name: cargo check
        run: cargo check --workspace --exclude argus-ebpf

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libssl-dev libpq-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --exclude argus-ebpf

  ebpf:
    name: eBPF build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          targets: bpfel-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          key: ebpf

      - name: Build eBPF
        run: cargo +nightly build -p argus-ebpf --release

      - name: Check eBPF artifact
        run: |
          ls -lh target/bpfel-unknown-none/release/
          file target/bpfel-unknown-none/release/libargus_ebpf.a || echo "eBPF artifact built"
