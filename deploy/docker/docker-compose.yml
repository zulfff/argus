version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      # These MUST be set explicitly in your environment
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  argus-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: postgres://argus:${DB_PASSWORD}@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      ARGUS_JWT_SECRET: ${JWT_SECRET}       # MUST be set explicitly
      RUST_LOG: argus=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      # MUST be set explicitly
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ../grafana/argus-dashboard.json:/etc/grafana/provisioning/dashboards/argus.json
    depends_on:
      - argus-api

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

volumes:
  pgdata:
