services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-argus-auto-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  argus-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: postgres://argus:${DB_PASSWORD:-argus-auto-secret}@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      ARGUS_JWT_SECRET: ${JWT_SECRET}
      ARGUS_ADMIN_USER: ${ARGUS_ADMIN_USER:-admin}
      ARGUS_ADMIN_PASS: ${ARGUS_ADMIN_PASS}
      RUST_LOG: ${RUST_LOG:-argus=info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ../grafana/argus-dashboard.json:/etc/grafana/provisioning/dashboards/argus.json:ro
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  pgdata: